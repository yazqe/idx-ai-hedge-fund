services:
  app:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      - PORT=8000
    volumes:
      - app-data:/app/analysis/data
    expose:
      - "8000"

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "157.90.166.219:80:80"
      - "157.90.166.219:443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - app

volumes:
  app-data:
  caddy-data:
  caddy-config:
