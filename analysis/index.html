<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IDX AI Hedge Fund — Analysis</title>
<style>
  :root {
    --bg:#0d1117;--card:#161b22;--border:#30363d;--text:#c9d1d9;--muted:#8b949e;
    --green:#3fb950;--green-bg:#0d2a14;--red:#f85149;--red-bg:#2d0f0f;
    --gold:#e3b341;--blue:#58a6ff;--purple:#bc8cff;--accent:#1f6feb;
    --teal:#39d353;--orange:#f0883e;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;font-size:13px}
  header{background:var(--card);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
  header h1{font-size:20px;font-weight:800;color:var(--blue)}
  .sub{font-size:11px;color:var(--muted);background:#1c2128;padding:2px 10px;border-radius:10px}
  .meta{margin-left:auto;font-size:11px;color:var(--muted);text-align:right}
  .meta span{display:block}

  .stats-bar{background:var(--card);border-bottom:1px solid var(--border);padding:10px 24px;display:flex;gap:24px;flex-wrap:wrap;align-items:center}
  .stat{display:flex;align-items:center;gap:8px;font-size:12px}
  .stat-num{font-size:20px;font-weight:800}

  main{padding:20px 24px;display:grid;gap:16px}

  /* Summary cards */
  .top3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
  @media(max-width:800px){.top3{grid-template-columns:1fr}}

  .decision-card{border-radius:12px;padding:16px;border:1px solid var(--border)}
  .decision-card.execute{background:#0d1f0d;border-color:var(--green)}
  .decision-card.monitor{background:#1a1a0d;border-color:var(--gold)}
  .decision-card.pass{background:var(--red-bg);border-color:var(--red)}
  .dc-title{font-size:11px;text-transform:uppercase;letter-spacing:.8px;font-weight:700;margin-bottom:10px}
  .execute .dc-title{color:var(--green)}
  .monitor .dc-title{color:var(--gold)}
  .pass .dc-title{color:var(--red)}

  /* Full results table */
  .results-grid{display:grid;gap:12px}
  .stock-card{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden}
  .stock-card.execute{border-left:4px solid var(--green)}
  .stock-card.monitor{border-left:4px solid var(--gold)}
  .stock-card.pass{border-left:4px solid #30363d}

  .stock-header{padding:12px 16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;cursor:pointer}
  .stock-header:hover{background:#1c2128}
  .ticker{font-size:18px;font-weight:800;color:var(--blue)}
  .decision-badge{padding:3px 12px;border-radius:20px;font-size:11px;font-weight:700}
  .badge-execute{background:var(--green-bg);color:var(--green)}
  .badge-monitor{background:#2a2a0a;color:var(--gold)}
  .badge-pass{background:#1c2128;color:var(--muted)}

  .signals-row{display:flex;gap:6px;flex-wrap:wrap}
  .sig{font-size:10px;padding:2px 6px;border-radius:6px;font-weight:600}
  .sig-buy{background:#0d2a14;color:var(--green)}
  .sig-sell{background:var(--red-bg);color:var(--red)}
  .sig-hold{background:#1c2128;color:var(--muted)}
  .sig-sbuy{background:var(--green);color:#000}
  .sig-ssell{background:var(--red);color:#fff}

  .stock-body{padding:14px 16px;border-top:1px solid var(--border);display:none}
  .stock-body.open{display:block}

  .trade-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px;margin-bottom:12px}
  .trade-box{background:#1c2128;border-radius:8px;padding:8px 10px}
  .trade-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
  .trade-value{font-size:14px;font-weight:700;margin-top:2px}

  .debate-box{background:#1c2128;border-radius:8px;padding:10px 12px;font-size:11px;color:var(--text);line-height:1.6;margin-bottom:10px}
  .reasoning-box{background:#0d1117;border-radius:8px;padding:10px 12px;font-size:11px;color:var(--muted);line-height:1.6;border:1px solid var(--border)}

  .risk-flags{display:flex;flex-direction:column;gap:4px;margin-top:8px}
  .flag{font-size:10px;color:var(--red);padding:3px 8px;background:var(--red-bg);border-radius:4px}

  .pos{color:var(--green)}.neg{color:var(--red)}.neu{color:var(--muted)}
  .loading{text-align:center;padding:60px;color:var(--muted)}
  .spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 16px}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<header>
  <h1>🤖 IDX AI Hedge Fund</h1>
  <span class="sub">Multi-Agent Analysis</span>
  <span class="sub">LangGraph + Claude</span>
  <a href="../" style="color:var(--blue);font-size:11px;text-decoration:none">← Scalping Dashboard</a>
  <a href="../swing/" style="color:var(--teal);font-size:11px;text-decoration:none">📈 Swing Dashboard</a>
  <div class="meta">
    <span id="gen-date">–</span>
    <span id="gen-time" style="color:var(--text);font-weight:600">–</span>
  </div>
</header>

<div class="stats-bar">
  <div class="stat"><span class="stat-num" style="color:var(--green)" id="cnt-ex">–</span><span>Execute</span></div>
  <div class="stat"><span class="stat-num" style="color:var(--gold)" id="cnt-mo">–</span><span>Monitor</span></div>
  <div class="stat"><span class="stat-num" style="color:var(--muted)" id="cnt-pa">–</span><span>Pass</span></div>
  <div style="margin-left:auto;font-size:11px;color:var(--muted)">Update otomatis setiap hari pukul 16:00 WIB</div>
</div>

<main id="main">
  <div class="loading"><div class="spinner"></div>Memuat analisis AI…</div>
</main>

<script>
const fmt = (n,d=0) => n==null?'–':Number(n).toLocaleString('id-ID',{minimumFractionDigits:d,maximumFractionDigits:d});
const clr  = p => p>0?'pos':p<0?'neg':'neu';
const sign = p => p>0?'+':'';

function sigClass(s) {
  const m = {STRONG_BUY:'sig-sbuy',BUY:'sig-buy',HOLD:'sig-hold',SELL:'sig-sell',STRONG_SELL:'sig-ssell'};
  return m[s] || 'sig-hold';
}

function renderCard(r) {
  const cls = r.decision==='EXECUTE'?'execute':r.decision==='MONITOR'?'monitor':'pass';
  const icon = r.decision==='EXECUTE'?'✅':r.decision==='MONITOR'?'👀':'⛔';
  const bdg  = `badge-${cls}`;

  const signals = (r.analyst_signals||[]).map(s=>
    `<span class="sig ${sigClass(s.signal)}">${s.type[0].toUpperCase()} ${s.signal}</span>`
  ).join('');

  const tradeBoxes = r.decision !== 'PASS' && r.entry_price ? `
    <div class="trade-row">
      <div class="trade-box"><div class="trade-label">Action</div><div class="trade-value" style="color:${r.action?.includes('BUY')?'var(--green)':'var(--red)'}">${r.action||'–'}</div></div>
      <div class="trade-box"><div class="trade-label">Entry</div><div class="trade-value">Rp${fmt(r.entry_price)}</div></div>
      <div class="trade-box"><div class="trade-label">Target</div><div class="trade-value" style="color:var(--green)">Rp${fmt(r.target_price)}</div></div>
      <div class="trade-box"><div class="trade-label">Stop</div><div class="trade-value" style="color:var(--red)">Rp${fmt(r.stop_loss)}</div></div>
      <div class="trade-box"><div class="trade-label">Position</div><div class="trade-value" style="color:var(--gold)">${(r.position_size||0).toFixed(1)}%</div></div>
      <div class="trade-box"><div class="trade-label">Risk</div><div class="trade-value" style="color:${r.risk_level==='LOW'?'var(--green)':r.risk_level==='HIGH'||r.risk_level==='REJECT'?'var(--red)':'var(--gold)'}">${r.risk_level||'–'}</div></div>
    </div>` : '';

  const flags = (r.risk_flags||[]).slice(0,3).map(f=>`<div class="flag">⚠️ ${f}</div>`).join('');

  return `
  <div class="stock-card ${cls}">
    <div class="stock-header" onclick="this.nextElementSibling.classList.toggle('open')">
      <span class="ticker">${r.ticker}</span>
      <span class="decision-badge ${bdg}">${icon} ${r.decision}</span>
      <span style="font-size:12px;color:var(--muted)">${r.sector||'–'}</span>
      <span style="font-size:13px;font-weight:600">Rp${fmt(r.market_price)}</span>
      <span class="${clr(r.market_change)}" style="font-size:12px">${sign(r.market_change)}${(r.market_change||0).toFixed(2)}%</span>
      <div class="signals-row">${signals}</div>
      <span style="font-size:11px;color:${r.debate_winner==='BULL'?'var(--green)':'var(--red)'}">
        ${r.debate_winner||'–'} wins → ${r.debate_consensus||'–'}
      </span>
      <span style="margin-left:auto;font-size:10px;color:var(--muted)">RSI ${r.rsi?.toFixed(0)||'–'} | ▼ expand</span>
    </div>
    <div class="stock-body">
      ${tradeBoxes}
      <div class="debate-box"><strong style="color:var(--gold)">⚔️ Debate:</strong> ${r.debate_summary||'–'}</div>
      <div class="reasoning-box"><strong>📋 Final Reasoning:</strong><br>${r.reasoning||'–'}</div>
      ${flags ? `<div class="risk-flags">${flags}</div>` : ''}
      <div style="margin-top:8px;font-size:10px;color:var(--muted)">Analyzed: ${r.analyzed_at}</div>
    </div>
  </div>`;
}

function renderTopSection(results) {
  const exec    = results.filter(r=>r.decision==='EXECUTE');
  const monitor = results.filter(r=>r.decision==='MONITOR');
  const pass_   = results.filter(r=>r.decision==='PASS');

  const mkList = (items, cls) => items.length
    ? items.map(r=>`<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--border)">
        <span style="font-weight:700;color:var(--blue)">${r.ticker}</span>
        <span style="font-size:11px;color:var(--muted)">${r.sector?.substring(0,18)||'–'}</span>
        <span class="${clr(r.market_change)}">${sign(r.market_change)}${(r.market_change||0).toFixed(1)}%</span>
      </div>`).join('')
    : '<div style="color:var(--muted);font-size:11px;padding:8px 0">–</div>';

  return `
  <div class="top3">
    <div class="decision-card execute">
      <div class="dc-title">✅ Execute (${exec.length})</div>
      ${mkList(exec,'execute')}
    </div>
    <div class="decision-card monitor">
      <div class="dc-title">👀 Monitor (${monitor.length})</div>
      ${mkList(monitor,'monitor')}
    </div>
    <div class="decision-card pass">
      <div class="dc-title">⛔ Pass (${pass_.length})</div>
      ${mkList(pass_,'pass')}
    </div>
  </div>`;
}

async function load() {
  try {
    const r = await fetch('./data/latest.json?t=' + Date.now());
    if (!r.ok) throw new Error();
    const d = await r.json();

    document.getElementById('gen-date').textContent  = d.date || '–';
    document.getElementById('gen-time').textContent  = 'Generated: ' + d.generated_at;
    document.getElementById('cnt-ex').textContent    = d.execute_count || 0;
    document.getElementById('cnt-mo').textContent    = d.monitor_count || 0;
    document.getElementById('cnt-pa').textContent    = d.pass_count    || 0;

    const results = d.results || [];
    document.getElementById('main').innerHTML =
      renderTopSection(results) +
      `<div style="font-size:12px;color:var(--muted);margin-top:4px">
        ${results.length} stocks analyzed — klik saham untuk detail lengkap
      </div>` +
      '<div class="results-grid">' + results.map(renderCard).join('') + '</div>';
  } catch(e) {
    document.getElementById('main').innerHTML =
      '<div class="loading"><div class="spinner"></div>Data belum tersedia — menunggu analisis pertama…<br><span style="font-size:11px;margin-top:8px;display:block">Run: python batch_analysis.py</span></div>';
  }
}

load();
setInterval(load, 15*60*1000);
</script>
</body>
</html>
