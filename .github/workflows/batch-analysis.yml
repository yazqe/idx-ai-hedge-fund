name: IDX AI Hedge Fund — Daily Analysis

on:
  schedule:
    # Run at 16:30 WIB (09:30 UTC) Mon-Fri — after market close
    - cron: '30 9 * * 1-5'
  workflow_dispatch:  # manual trigger

permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install anthropic langgraph langgraph-checkpoint-sqlite yfinance pandas pydantic requests python-dotenv

      - name: Run batch analysis (top 10 IDX stocks)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SECRET_TOKEN: ${{ secrets.SECRET_TOKEN }}
        run: python batch_analysis.py

      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add analysis/data/latest.json
          WIB_TIME=$(TZ='Asia/Jakarta' date '+%Y-%m-%d %H:%M WIB')
          git diff --staged --quiet || git commit -m "analysis: daily run ${WIB_TIME}"
          git pull --rebase origin main
          git push
